<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单图片编辑器</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    header {
      padding: 24px;
      text-align: center;
      background: #253858;
      color: white;
    }

    main {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
    }

    section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1,
    h2 {
      margin-top: 0;
    }

    .file-box {
      margin-bottom: 24px;
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccd3dc;
      border-radius: 8px;
      background: #fafafa;
    }

    .tool-group {
      margin-bottom: 18px;
    }

    .tool-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .tool-group input {
      width: 100%;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #0065ff;
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #6b778c;
    }

    .preview-area {
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #ccd3dc;
      border-radius: 12px;
      background: #fbfcfd;
      text-align: center;
      color: #6b778c;
    }

    .preview-area img {
      max-width: 100%;
      max-height: 420px;
      display: none;
    }

    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>简单图片编辑器</h1>
    <p>选择图片后，可以在这里规划亮度、对比度、旋转和裁剪等操作。</p>
  </header>

  <main>
    <section class="control-panel">
      <h2>操作面板</h2>

      <div class="file-box">
        <label for="image-file">选择图片</label>
        <input type="file" id="image-file" accept="image/*">
      </div>

      <div class="tool-group">
        <label for="brightness">亮度</label>
        <input type="range" id="brightness" min="0" max="200" value="100">
      </div>

      <div class="tool-group">
        <label for="contrast">对比度</label>
        <input type="range" id="contrast" min="0" max="200" value="100">
      </div>

      <div class="tool-group">
        <label for="rotate">旋转角度</label>
        <input type="number" id="rotate" value="0" step="90">
      </div>

      <div class="button-row">
        <button type="button">应用效果</button>
        <button type="button" class="secondary">重置</button>
      </div>
    </section>

    <section class="preview-panel">
      <h2>预览区域</h2>
      <div class="preview-area">
        <p>图片预览会显示在这里</p>
        <img src="" alt="图片预览">
      </div>
    </section>
  </main>
</body>
</html>
